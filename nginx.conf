events { worker_connections 1024; }
http {
    include /etc/nginx/mime.types;
    server {
        listen $PORT;
        root /usr/share/nginx/html;
        index index.html;
        location / {
            try_files $uri $uri/ /index.html;
        }
        gzip on;
        gzip_types text/html text/css application/javascript application/json;
    }
}
